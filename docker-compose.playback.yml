# 生产可选：qBittorrent（BT 下载）
# 本地测试不需要；直接把视频放进 MEDIA_ROOT 即可播
#
#   mkdir -p data/bt-downloads
#   docker compose -f docker-compose.playback.yml up -d
#
# WebUI http://<host>:8085
# .env.production: QB_ENABLED=true  MEDIA_ROOT=./data/bt-downloads
# 卷须与 MEDIA_ROOT 指向同一宿主机目录

services:
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: anime-chat-qbittorrent
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Shanghai
      - WEBUI_PORT=8085
    volumes:
      - qb-config:/config
      - ./data/bt-downloads:/downloads
    ports:
      - '8085:8085'
      - '6881:6881'
      - '6881:6881/udp'
    restart: unless-stopped

volumes:
  qb-config:
